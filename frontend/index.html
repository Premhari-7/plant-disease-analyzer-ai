<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plant Disease Analyzer</title>

    <!-- ⭐ Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ⭐ Font Awesome Icons (React-icons style) -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- CSS + JS -->
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>

<div class="container">

    <!-- 🔹 Sidebar -->
    <div class="sidebar">
        <ul>
            <li onclick="location.href='index.html'">
                <i class="fa-solid fa-house"></i>
                <span>Home</span>
            </li>

            <li onclick="location.href='report.html'">
                <i class="fa-solid fa-chart-column"></i>
                <span>Disease Report</span>
            </li>

            <li onclick="location.href='monthly.html'">
                <i class="fa-solid fa-calendar-days"></i>
                <span>Monthly Analysis</span>
            </li>

            <li onclick="location.href='chatbot.html'">
                <i class="fa-solid fa-robot"></i>
                <span>Chatbot</span>
            </li>

            <li onclick="location.href='about.html'">
                <i class="fa-solid fa-circle-info"></i>
                <span>About</span>
            </li>
        </ul>
    </div>

    <!-- 🔹 Main Content -->
    <div class="main">

        <!-- Background Image -->
        <img src="images/wallhaven-k99me1.jpg" class="bg-image">

        <!-- 🤖 CHATBOT -->
        <div class="pd-chatbot">

            <h2>
                <i class="fa-solid fa-seedling"></i>
                Plant Disease Chatbot
            </h2>

            <div id="pdChatBox" class="pd-chat-area">
                <div class="pd-bot-msg">
                    🌱 Hello! Ask me about plant diseases, symptoms, or cures.
                </div>
            </div>

            <div class="pd-chat-input">
                <input
                    type="text"
                    id="pdUserInput"
                    placeholder="Ask in English or Tamil (உதா: potato early blight)"
                >
                <button onclick="sendChat()">Send</button>
            </div>

        </div>

        <!-- 🌿 Analyzer Card -->
        <div class="card">

            <h1>
                <i class="fa-solid fa-leaf"></i>
                Plant Disease Analyzer
            </h1>

            <p>Upload a plant leaf image to detect disease</p>

            <input type="file" id="imageInput" accept="image/*">

            <button onclick="analyzeImage()">
                <i class="fa-solid fa-magnifying-glass"></i>
                Analyze Image
            </button>

            <div id="result" class="result-box"></div>

        </div>

    </div>
</div>

</body>
</html>
