<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Monthly Analysis</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Icons -->
    <link rel="stylesheet"
     href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="monthly.css">
</head>
<body>

<div class="container">

    <!-- 🔹 Sidebar -->
    <div class="sidebar">
        <ul>
            <li onclick="location.href='index.html'">
                <i class="fa-solid fa-house"></i><span>Home</span>
            </li>

            <li onclick="location.href='report.html'">
                <i class="fa-solid fa-chart-column"></i><span>Disease Report</span>
            </li>

            <li class="active">
                <i class="fa-solid fa-calendar-days"></i><span>Monthly Analysis</span>
            </li>

            <li onclick="location.href='chatbot.html'">
                <i class="fa-solid fa-robot"></i><span>Chatbot</span>
            </li>

            <li onclick="location.href='about.html'">
                <i class="fa-solid fa-circle-info"></i><span>About</span>
            </li>
        </ul>
    </div>

    <!-- 🔹 Main Area -->
    <div class="main monthly-main">

        <div class="graph-wrapper">

            <!-- ⭐ Title -->
            <h2>
                <i class="fa-solid fa-chart-line"></i>
                Monthly Disease Analysis
            </h2>

            <!-- ⭐ Description -->
            <p class="graph-desc">
                This report is based on publicly available agricultural data
                collected from online sources ( Google) and used to
                visualize disease trends across months.
            </p>

            <!-- ⭐ Chart -->
            <canvas id="monthlyChart"></canvas>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="monthly.js"></script>

</body>
</html>
